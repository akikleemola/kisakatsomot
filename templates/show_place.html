<!DOCTYPE html>
<html>

<head>
  <title>{{ place.title }}</title>
</head>

<body>
  <h1>{{ place.title }}</h1>
  {% if session.user_id == place.user_id %}
  <p>
    <a href="/edit_place/{{ place.id }}">Muokkaa</a>
  </p>
  {% endif %}

  <p><b>Kaupunki:</b> {{ place.city }}</p>
  <p><b>Osoite:</b> {{ place.address }}</p>
  <p><b>Kuvaus:</b> {{ place.description }}</p>
  
  <p><b>Paikan lisäsi käyttäjä:</b> {{ place.username }}</p>

  <br>
  <a href="/">Palaa etusivulle</a>
</body>

</html>
