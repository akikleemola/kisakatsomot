{% extends "layout.html" %}

{% block title %}Ilmoituksen muokkaaminen{% endblock %}

{% block content %}
<h2>{{ place.title }}</h2>
<h3>Ilmoituksen muokkaaminen</h3>
  
<form action="/update_place" method="post">
  <p>
    <label for="title">Paikan nimi:</label> <br />
    <input type="text" id="title" name="title" value="{{ place.title }}" maxlength="50" required/>
  </p>

  <p>
    <label for="city">Kaupunki:</label> <br />
    <input type="text" id="city" name="city" value="{{ place.city }}" maxlength="50" required/>
  </p>

  <p>
    <label for="address">Osoite:</label> <br />
    <input type="text" id="address" name="address" value="{{ place.address }}" maxlength="50" required/>
  </p>

  <p>
    <label for="description">Kuvaus (mitä lajeja näkyy, millainen tunnelma jne.):</label> <br />
    <textarea id="description" name="description" rows="8" cols="60" maxlength="1000" required>{{ place.description }}</textarea>
  </p>

  <input type="hidden" name="place_id" value="{{ place.id }}"/>

  {% for class_name in all_classes %}
  <p>
    <label for="classes_{{ class_name }}"> {{ class_name }}:</label> <br />
    <select id="classes_{{ class_name }}" name="classes">
      <option value="">Valitse</option>
    {% for option in all_classes[class_name] %}
      {% if classes[class_name] == option %}
      <option value="{{ class_name }}:{{ option }}" selected> {{ option }}</option>
      {% else %}
      <option value="{{ class_name }}:{{ option }}"> {{ option }}</option>
      {% endif %}
    {% endfor %}
    </select>
  </p>
  {% endfor %}

  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  <input type="submit" value="Päivitä ilmoitusta" />
</form>
<p>
  <a href="/place/{{ place.id }}">Takaisin ilmoitukseen</a>
</p>
{% endblock %}
