{% extends "layout.html" %}

{% block title %}Käyttäjä {{ user.username }}{% endblock %}

{% block content %}

<h2>Käyttäjä {{ user.username }}</h2>
<p>
  Käyttäjällä on yhteensä {{ places | count }} ilmoitusta.
</p>
<h3>Ilmoitukset</h3>
<ul>
  {% for place in places %}
  <li><a href="/place/{{ place.id }}">{{ place.title }}</a></li>
  {% endfor %}
</ul>
{% endblock %}
