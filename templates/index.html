<!DOCTYPE html>
<html>

<head>
  <title>Kisakatsomot</title>
</head>

<body>
    <h1>Kisakatsomot</h1>
  {% if session.username %}
  <p>
    Olet kirjautunut nimellä {{ session.username }}, id-numerosi on {{ session.user_id }}
  </p>
  {% endif %}
  <p>
    <a href="/login"> Kirjaudu sisään</a>
    <a href="/register"> Luo tunnus</a>
    <a href="/logout"> Kirjaudu ulos</a>
  </p>
  <p>
    <a href="/new_place">Uusi paikka</a>
    <a href="/find_place">Etsi paikkoja</a>
  </p>
  <h2>Kisakatsomot</h2>
  <ul>
    {% for place in places %}
    <li><a href="/place/{{ place.id }}">{{place.title }}</a></li>
    {% endfor %}
  </ul>
  
</body>

</html>
