{% extends "layout.html" %}

{% block title %}Muokkaa arvostelua{% endblock %}

{% block content %}

<h2>Muokkaa arvostelua</h2>
  
<p><b>Paikka:</b> {{ place.title }}</p>
  
<form action="/update_review" method="post">
  <input type="hidden" name="review_id" value="{{ review.id }}">
  <input type="hidden" name="place_id" value="{{ review.place_id }}">
    
  <p>
    <label for="stars">Arvosana (1-5):</label> <br>
    <input type="number" id="stars" name="stars" min="1" max="5" value="{{ review.stars }}" required>
  </p>
  
  <p>
    <label for="comment">Kommentti:</label> <br>
    <textarea id="comment" name="comment" rows="4" cols="50" required>{{ review.comment }}</textarea>
  </p>
  
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" /> 
  <input type="submit" value="Tallenna muutokset">
</form>
  
<p><a href="/place/{{ review.place_id }}">Takaisin</a></p>
{% endblock %}
