<!DOCTYPE html>
<html>

<head>
  <title>Uusi kisakatsomo</title>
</head>

<body>
  <h1>Uuden paikan lisääminen</h1>
  
  <form action="/create_place" method="post">
    <p>
      Paikan nimi: <br />
      <input type="text" name="title"/>
    </p>

    <p>
      Kaupunki: <br />
      <input type="text" name="city"/>
    </p>

    <p>
      Osoite: <br />
      <input type="text" name="address"/>
    </p>

    <p>
      Kuvaus (mitä lajeja näkyy, millainen tunnelma jne.): <br />
      <textarea name="description" rows="8" cols="60"></textarea>
    </p>

    <input type="submit" value="Luo uusi paikka" />
  </form>
</body>

</html>
